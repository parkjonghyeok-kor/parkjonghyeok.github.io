<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Salpuri - Parkjonghyeok</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1><a href="index.html" style="text-decoration:none; color:black;">Parkjonghyeok</a></h1>
        <nav>
            <ul>
                <li><a href="salpuri.html" style="color:black; font-weight:bold;">Salpuri</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
    </header>
    
    <main class="gallery-container">
    <div class="slides">
        <img src="salpuri/work06.jpg" class="slide active">
        <img src="salpuri/work08.jpg" class="slide">
        <img src="salpuri/work10.jpg" class="slide">
        <img src="salpuri/work11.jpg" class="slide">
        <img src="salpuri/work16.jpg" class="slide">
        <img src="salpuri/work19.jpg" class="slide">
    </div>
</main>

<script>
    const slides = document.querySelectorAll('.slide');
    let currentIndex = 0;

    // 사진을 클릭하면 다음 사진으로 넘어가는 기능
    document.querySelector('.gallery-container').addEventListener('click', () => {
        slides[currentIndex].classList.remove('active'); // 현재 사진 숨기기
        currentIndex = (currentIndex + 1) % slides.length; // 다음 인덱스로 (마지막이면 처음으로)
        slides[currentIndex].classList.add('active'); // 다음 사진 보여주기
    });
</script>
</body>
</html>
